name: Refresh FPL data

on:
  schedule:
    - cron: '0 7 * * *'   # Every day at 07:00 UTC
  workflow_dispatch:       # Allow manual trigger from the Actions tab

permissions:
  contents: write          # Needed to commit updated docs/data/ files

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

      - name: Fetch FPL data
        run: python src/fetch.py
        # Falls back to mock data automatically if API is unavailable

      - name: Build site
        run: python src/build.py

      - name: Commit and push updated site
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "chore: refresh FPL data $(date -u +'%Y-%m-%d')"
          git push
